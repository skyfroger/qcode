- name: clear
  category: C
  description: Удаляет все элементы из коллекции.
  class_name: list
  parameters: []
  returns:
    type: None
    description: Модифицирует коллекцию на месте
  examples:
    - code: "lst = [1, 2, 3]\nlst.clear()\nlst"
      output: "[]"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#list.clear

- name: index
  category: I
  description: Возвращает индекс первого вхождения значения.
  class_name: list
  parameters:
    - name: value
      type_hint: object
      required: true
      description: Искомое значение
    - name: start
      type_hint: int
      required: false
      description: Начало поиска
    - name: end
      type_hint: int
      required: false
      description: Конец поиска
  returns:
    type: int
    description: Индекс вхождения
  examples:
    - code: "[1, 2, 3].index(2)"
      output: '1'
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#list.index

- name: get
  category: G
  description: Возвращает значение по ключу или default, если ключ не найден.
  class_name: dict
  parameters:
    - name: key
      type_hint: Hashable
      required: true
      description: Ключ для поиска
    - name: default
      type_hint: object
      required: false
      default_value: None
      description: Значение по умолчанию
  returns:
    type: object
    description: Значение или default
  examples:
    - code: "d = {'a': 1}\nd.get('b', 0)"
      output: '0'
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#dict.get

- name: update
  category: U
  description: Обновляет словарь элементами из другого словаря или итерируемого объекта пар.
  class_name: dict
  parameters:
    - name: other
      type_hint: Mapping | Iterable[tuple]
      required: false
      description: Словарь или итерируемый объект для обновления
  returns:
    type: None
    description: Модифицирует словарь на месте
  examples:
    - code: "d = {'a': 1}\nd.update({'b': 2})\nd"
      output: "{'a': 1, 'b': 2}"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#dict.update

- name: keys
  category: K
  description: Возвращает представление ключей словаря.
  class_name: dict
  parameters: []
  returns:
    type: dict_keys
    description: Представление ключей
  examples:
    - code: "list({'a': 1, 'b': 2}.keys())"
      output: "['a', 'b']"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#dict.keys

- name: values
  category: V
  description: Возвращает представление значений словаря.
  class_name: dict
  parameters: []
  returns:
    type: dict_values
    description: Представление значений
  examples:
    - code: "list({'a': 1, 'b': 2}.values())"
      output: "[1, 2]"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#dict.values

- name: items
  category: I
  description: Возвращает представление пар ключ-значение словаря.
  class_name: dict
  parameters: []
  returns:
    type: dict_items
    description: Представление пар ключ-значение
  examples:
    - code: "list({'a': 1}.items())"
      output: "[('a', 1)]"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#dict.items

- name: add
  category: A
  description: Добавляет элемент во множество.
  class_name: set
  parameters:
    - name: elem
      type_hint: Hashable
      required: true
      description: Элемент для добавления
  returns:
    type: None
    description: Модифицирует множество на месте
  examples:
    - code: "s = {1, 2}\ns.add(3)\nprint(s)"
      output: "{1, 2, 3}"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#set.add

- name: discard
  category: D
  description: Удаляет элемент из множества, если он присутствует (не вызывает ошибку, если отсутствует).
  class_name: set
  parameters:
    - name: elem
      type_hint: Hashable
      required: true
      description: Элемент для удаления
  returns:
    type: None
    description: Модифицирует множество на месте
  examples:
    - code: "s = {1, 2, 3}\ns.discard(2)\ns"
      output: "{1, 3}"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#set.discard

- name: union
  category: U
  description: Возвращает новое множество с элементами из данного и других множеств.
  class_name: set
  parameters:
    - name: others
      variadic: true
      description: Другие итерируемые объекты
  returns:
    type: set
    description: Новое множество
  examples:
    - code: "{1, 2}.union({2, 3})"
      output: "{1, 2, 3}"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#set.union

- name: intersection
  category: I
  description: Возвращает новое множество с общими элементами.
  class_name: set
  parameters:
    - name: others
      variadic: true
      description: Другие итерируемые объекты
  returns:
    type: set
    description: Новое множество
  examples:
    - code: "{1, 2, 3}.intersection({2, 3, 4})"
      output: "{2, 3}"
  is_class: false
  url: https://docs.python.org/3/library/stdtypes.html#set.intersection

- name: read
  category: R
  description: Читает до size байт/символов из файла.
  class_name: TextIOWrapper
  parameters:
    - name: size
      type_hint: int
      required: false
      default_value: '-1'
      description: Количество байт/символов для чтения
  returns:
    type: str | bytes
    description: Прочитанные данные
  examples:
    - code: with open('file.txt') as f: content = f.read()
      output: ''
  is_class: false
  url: https://docs.python.org/3/library/io.html#io.TextIOWrapper.read

- name: write
  category: W
  description: Записывает строку/байты в файл.
  class_name: TextIOWrapper
  parameters:
    - name: s
      type_hint: str | bytes
      required: true
      description: Данные для записи
  returns:
    type: int
    description: Количество записанных символов/байт
  examples:
    - code: with open('out.txt', 'w') as f: f.write('Hello')
      output: ''
  is_class: false
  url: https://docs.python.org/3/library/io.html#io.TextIOWrapper.write

- name: close
  category: C
  description: Закрывает файл, освобождая ресурсы.
  class_name: TextIOWrapper
  parameters: []
  returns:
    type: None
    description: Не возвращает значения
  examples:
    - code: f = open('file.txt')\nf.close()
      output: ''
  is_class: false
  url: https://docs.python.org/3/library/io.html#io.IOBase.close

- name: seek
  category: S
  description: Перемещает указатель файла в новую позицию.
  class_name: TextIOWrapper
  parameters:
    - name: offset
      type_hint: int
      required: true
      description: Смещение в байтах/символах
    - name: whence
      type_hint: int
      required: false
      default_value: '0'
      description: '0: начало, 1: текущая позиция, 2: конец'
  returns:
    type: int
    description: Новая позиция указателя
  examples:
    - code: f = open('file.txt')\nf.seek(0)\nf.close()
      output: ''
  is_class: false
  url: https://docs.python.org/3/library/io.html#io.IOBase.seek

- name: flush
  category: F
  description: Сбрасывает внутренний буфер вывода на диск.
  class_name: TextIOWrapper
  parameters: []
  returns:
    type: None
    description: Не возвращает значения
  examples:
    - code: f = open('log.txt', 'w')\nf.write('Hi')\nf.flush()
      output: ''
  is_class: false
  url: https://docs.python.org/3/library/io.html#io.IOBase.flush

- name: group
  category: G
  description: Возвращает одну или несколько подгрупп совпадения.
  class_name: re.Match
  parameters:
    - name: group
      type_hint: int | str
      required: false
      variadic: true
      description: Номер или имя группы
  returns:
    type: str | tuple[str]
    description: Строка совпадения или кортеж
  examples:
    - code: import re\nm = re.match(r'(\\w+)', 'hello')\nm.group(1)
      output: "'hello'"
  is_class: false
  url: https://docs.python.org/3/library/re.html#re.Match.group

- name: start
  category: S
  description: Возвращает начальный индекс совпадения группы.
  class_name: re.Match
  parameters:
    - name: group
      type_hint: int | str
      required: false
      description: Номер или имя группы
  returns:
    type: int
    description: Начальный индекс
  examples:
    - code: import re\nm = re.search('world', 'hello world')\nm.start()
      output: '6'
  is_class: false
  url: https://docs.python.org/3/library/re.html#re.Match.start

- name: end
  category: E
  description: Возвращает конечный индекс совпадения группы.
  class_name: re.Match
  parameters:
    - name: group
      type_hint: int | str
      required: false
      description: Номер или имя группы
  returns:
    type: int
    description: Конечный индекс
  examples:
    - code: import re\nm = re.search('world', 'hello world')\nm.end()
      output: '11'
  is_class: false
  url: https://docs.python.org/3/library/re.html#re.Match.end